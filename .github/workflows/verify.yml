name: Verify Toybox FPS Arena

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      public_url:
        description: "Optional deployed HTTPS URL to verify with /health and /ws"
        required: false
        type: string

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start local production server
        run: |
          PORT=5188 npm start > /tmp/toybox-server.log 2>&1 &
          echo $! > /tmp/toybox-server.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5188/health; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/toybox-server.log
          exit 1

      - name: Smoke multiplayer
        run: npm run test:smoke

      - name: Verify deployed URL
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.public_url != '' }}
        run: npm run verify:public -- "${{ inputs.public_url }}"

      - name: Stop local server
        if: always()
        run: |
          if [ -f /tmp/toybox-server.pid ]; then
            kill "$(cat /tmp/toybox-server.pid)" || true
          fi
